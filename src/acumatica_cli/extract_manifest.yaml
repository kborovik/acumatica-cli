# extract_manifest.yaml - what `acu extract` reads off a live tenant and
# how each entity becomes a seed file (the inverse of apply).
#
# Per entity row:
#   entity    contract entity name (the GET source and the emitted `entity:`)
#   endpoint  omitted = the instance Default endpoint; the symbolic name
#             `bootstrap` stays symbolic in emitted files and resolves to
#             the active Bootstrap package version at HTTP/load time
#             (data-repo bootstrap/project.xml when present, else
#             packaged minimal - V20/V21)
#   keys      key fields: the emitted `key:`, the record sort order, and
#             the B9 fallback's $select projection; the tuple must
#             identify each record (V25 - a dup tuple is a row failure)
#             and the FIRST key must be a primary-view field filterable
#             alone: diff's read-back filters on it and matches the rest
#             client-side, because a $filter AND spanning views answers
#             200 [] (B14/B21)
#   filter    OData $filter fragment riding both list reads (the plain
#             GET and the B9 $select fallback), so the per-key walk only
#             visits filtered keys; narrows extraction to configured
#             records when the entity serves tenant-native noise (T52)
#   file      destination path; the numbered prefix encodes apply order
#             (V22: dir expansion sorts alphabetically, so a record that
#             references another entity must sort after the file that
#             creates it - B10)
#   strip     deny-list: live fields dropped from extracted records; the
#             inline reasons are load-bearing (B10/B11 knowledge as code)
#   include   allow-list: the only non-key fields kept (mutually
#             exclusive with strip); key fields always survive both
#   features  FeaturesSet gates the entity's screen needs (V22 feature
#             closure; consumed by the features.yaml synthesis)
#
# Per setup row (setup/ action files are synthesized, not record dumps -
# an action leaves no keyed record to extract, so each kind reads the
# live state the action created and derives the action file back):
#   kind      selects the synthesizer in extract.py
#   file      destination path; numbered prefixes encode apply order

entities:

# bootstrap/ - the virgin-tenant phase via the custom Bootstrap endpoint:
# built-in endpoints cannot create the first organization (C).

- entity: Company
  endpoint: bootstrap
  keys: [AcctCD]
  file: bootstrap/company.yaml

- entity: CreditTerms
  endpoint: bootstrap
  keys: [TermsID]
  file: bootstrap/credit-terms.yaml

# baseline/ - numbered prefixes encode the V22 reference chain:
# subaccounts < accounts < currencies < ledger < GL preferences <
# org-ledger link; units of measure reference nothing and sort last.

- entity: Subaccount
  keys: [SubaccountCD]
  file: baseline/10-subaccounts.yaml
  features: [SubAccount] # GL203000 is feature-gated (B15)
  strip:
  # server-assigned surrogate identity (instance-global sequence) - a
  # sourced value is another tenant's row number, so a replayed tenant
  # diffs dirty forever (B11 class, T50 round-trip)
  - SubaccountID
  # server audit stamp: every PUT moves it, so a sourced value is
  # permanent drift (B11 class)
  - LastModifiedDateTime

- entity: Account
  keys: [AccountCD]
  file: baseline/20-accounts.yaml
  strip:
  # references PM account groups outside the baseline set - absent on a
  # fresh tenant, PUT 422s (B10)
  - AccountGroup
  # references CM rate types outside the baseline set (B10 class, T31)
  - RevaluationRateType
  # server-derived: PUT-tolerated, the server keeps its own derivation,
  # so a sourced value diffs dirty forever (B11)
  - ChartOfAccountsOrder
  - CashAccount
  # server-assigned surrogate identity (B11 class, T50 round-trip)
  - AccountID
  # server audit stamps (B11 class)
  - CreatedDateTime
  - LastModifiedDateTime

- entity: Currency
  endpoint: bootstrap
  keys: [CuryID]
  file: baseline/30-currencies.yaml
  features: [Multicurrency] # CM202000 financial currency (B6/B8)
  # Bootstrap Currency serves the whole tenant-native ISO list (~172
  # rows); IsFinancial marks the configured set (T50 archaeology) -
  # unfiltered, the extracted file is noise instead of config-as-code
  # and the B9 per-key walk costs minutes of one-row GETs
  filter: IsFinancial eq true
  strip:
  # Translation* pairs are read-invisible while the translation feature
  # is off: write-tolerated, never read back, so a sourced value diffs
  # "not returned by endpoint" (T31, V22 server-derived sibling)
  - TranslationGainAcctID
  - TranslationGainSubID
  - TranslationLossAcctID
  - TranslationLossSubID

- entity: Ledger
  keys: [LedgerID]
  file: baseline/40-ledger.yaml
  strip:
  # the server derives an Actual ledger's currency from the company base
  # currency - a sourced value is redundant or a rejected write (T34)
  - CurrencyID
  # server audit stamp (B11 class, T50 round-trip)
  - LastModifiedDateTime

- entity: GLPreferences
  endpoint: bootstrap
  keys: [RetEarnAccountID]
  file: baseline/50-gl-preferences.yaml

- entity: LedgerCompany
  endpoint: bootstrap
  # one record per org-ledger link: a multi-org tenant links several
  # organizations to one ledger, so LedgerCD alone under-keys the file
  # (B21) and the key is the pair. The pair spans two views - a $filter
  # AND across views answers 200 [] while each predicate alone matches
  # (B14) - so LedgerCD (the primary-view field) sits first: diff's
  # read-back filters on it alone and matches OrganizationID client-side
  keys: [LedgerCD, OrganizationID]
  file: baseline/60-ledger-company.yaml

- entity: UnitsOfMeasure
  keys: [UnitID]
  file: baseline/90-uoms.yaml

# setup/ - the GL action chain (T36/T37): financial-year setup, then
# calendar generation, then period activation; numbered prefixes mirror
# the verified apply order.

setup:

- kind: financial-year
  file: setup/10-financial-year.yaml

- kind: master-calendar
  file: setup/20-master-calendar.yaml

- kind: open-periods
  file: setup/30-open-periods.yaml
