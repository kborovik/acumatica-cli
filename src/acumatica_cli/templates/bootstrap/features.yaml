# FeaturesSet property names (DAC bit flags) the bootstrap plugin enables
# on publish. Deleting this file falls back to the same built-in six listed
# below; add names (e.g. Multicurrency, SubAccount) as the baseline needs
# them. A misspelled name enables nothing - the plugin flags it in the
# publish log.
- FinancialModule
- FinancialStandard
- DistributionModule
- Inventory
- Branch
- MultiCompany
