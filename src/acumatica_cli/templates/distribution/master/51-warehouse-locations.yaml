# Warehouse locations (IN204000 Locations tab) via the Default endpoint
# (symbolic endpoint: default — tracks ACU_API_VERSION / target.yaml).
# Bootstrap creates WH01 (CountryID on Address - Default 422s at insert)
# but has no Locations surface. With WarehouseLocation on, PO receipts and
# kit assembly need a real bin (MAIN) — otherwise qty sits on system
# <UNASSIGNED> and PurchaseReceipt line-split insert 422s.
#
# APPLY ORDER: after 50-warehouse.yaml (WH01 must exist). Header defaults
# (ReceivingLocationID etc.) land in 52-warehouse-defaults.yaml — a single
# PUT that creates Locations + sets defaults leaves those header fields
# empty on the server (live 26.101.0225 probe 2026-07-23).
entity: Warehouse
key: WarehouseID
endpoint: default
detail_keys:
  Locations: LocationID
records:
- WarehouseID: WH01
  Locations:
  - LocationID: MAIN
    Description: Main storage
    Active: true
    ReceiptsAllowed: true
    SalesAllowed: true
    TransfersAllowed: true
    AssemblyAllowed: true
