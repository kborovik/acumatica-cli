# Distribution golden path: buy finished goods -> sell -> invoice -> collect.
# Deltas (warm-tenant re-runnable):
#   purchases: 10x EDGE@139 + 5x CELL@195 + 5x RAIL@145 = 3090 -> 20200
#   sales: ACMEMFG 4x EDGE 1196 + NORTHGRID 3x CELL + 2x RAIL 2045
#     + AGRISENSE 3x EDGE 897 = 4138 revenue; COGS 7x139 + 3x195 + 2x145 = 1848
#   ACMEMFG pays in full -> AR 11000 +2942, cash 10100 +1196
#   inventory: EDGE +3 (10-7), CELL +2 (5-3), RAIL +3 (5-2)
scenario: buy-sell
description: Buy finished goods -> sell -> invoice -> collect
steps:
# ---- buy -------------------------------------------------------------
- id: po-gateways
  put: PurchaseOrder
  record:
    VendorID: SHENZHEN
    Hold: false
    Details:
    - {InventoryID: GW-EDGE, OrderQty: 10, UnitCost: 139.00}
    - {InventoryID: GW-CELL, OrderQty: 5, UnitCost: 195.00}
    - {InventoryID: GW-RAIL, OrderQty: 5, UnitCost: 145.00}
  capture: {OrderNbr: po_gateways}
- id: rcpt-gateways
  put: PurchaseReceipt
  record:
    Type: Receipt
    VendorID: SHENZHEN
    Hold: false
    Details:
    - {POOrderType: Normal, POOrderNbr: "${po_gateways}", POLineNbr: 1, ReceiptQty: 10}
    - {POOrderType: Normal, POOrderNbr: "${po_gateways}", POLineNbr: 2, ReceiptQty: 5}
    - {POOrderType: Normal, POOrderNbr: "${po_gateways}", POLineNbr: 3, ReceiptQty: 5}
  capture: {ReceiptNbr: rcpt_gateways}
- id: release-gateways
  action: {entity: PurchaseReceipt, name: ReleasePurchaseReceipt}
  record: {Type: Receipt, ReceiptNbr: "${rcpt_gateways}"}
  wait:
    entity: PurchaseReceipt
    keys: [Receipt, "${rcpt_gateways}"]
    until: {Status: Released}
# ---- sell: ACMEMFG (pays in full) ------------------------------------
- id: so-acme
  put: SalesOrder
  record:
    OrderType: SO
    CustomerID: ACMEMFG
    Hold: false
    Details:
    - {InventoryID: GW-EDGE, OrderQty: 4, WarehouseID: WH01}
  capture: {OrderNbr: so_acme}
- id: ship-acme
  action: {entity: SalesOrder, name: SalesOrderCreateShipment}
  record: {OrderType: SO, OrderNbr: "${so_acme}"}
  parameters: {WarehouseID: WH01}
- id: shipnbr-acme
  get:
    entity: SalesOrder
    keys: [SO, "${so_acme}"]
    expand: [Shipments]
  capture:
    Shipments[0].ShipmentNbr: ship_acme
- id: confirm-acme
  action: {entity: Shipment, name: ConfirmShipment}
  record: {ShipmentNbr: "${ship_acme}"}
  wait:
    entity: Shipment
    keys: ["${ship_acme}"]
    until: {Status: Confirmed}
- id: prepare-acme
  action: {entity: Shipment, name: PrepareInvoice}
  record: {ShipmentNbr: "${ship_acme}"}
- id: invnbr-acme
  get:
    entity: SalesOrder
    keys: [SO, "${so_acme}"]
    expand: [Shipments]
  capture:
    Shipments[0].InvoiceNbr: inv_acme
- id: release-inv-acme
  action: {entity: SalesInvoice, name: ReleaseSalesInvoice}
  record: {Type: Invoice, ReferenceNbr: "${inv_acme}"}
  wait:
    entity: SalesInvoice
    keys: [Invoice, "${inv_acme}"]
    until: {Status: Open}
- id: pay-acme
  put: Payment
  record:
    Type: Payment
    CustomerID: ACMEMFG
    PaymentMethod: WIRE
    CashAccount: '10100'
    PaymentAmount: 1196.00
    PaymentRef: "WIRE-${inv_acme}"
    Hold: false
    DocumentsToApply:
    - {DocType: Invoice, ReferenceNbr: "${inv_acme}", AmountPaid: 1196.00}
  capture: {ReferenceNbr: pmt_acme}
- id: release-pay-acme
  action: {entity: Payment, name: ReleasePayment}
  record: {Type: Payment, ReferenceNbr: "${pmt_acme}"}
  wait:
    entity: Payment
    keys: [Payment, "${pmt_acme}"]
    until: {Status: Closed}
# ---- sell: NORTHGRID (invoice stays open) ----------------------------
- id: so-northgrid
  put: SalesOrder
  record:
    OrderType: SO
    CustomerID: NORTHGRID
    Hold: false
    Details:
    - {InventoryID: GW-CELL, OrderQty: 3, WarehouseID: WH01}
    - {InventoryID: GW-RAIL, OrderQty: 2, WarehouseID: WH01}
  capture: {OrderNbr: so_northgrid}
- id: ship-northgrid
  action: {entity: SalesOrder, name: SalesOrderCreateShipment}
  record: {OrderType: SO, OrderNbr: "${so_northgrid}"}
  parameters: {WarehouseID: WH01}
- id: shipnbr-northgrid
  get:
    entity: SalesOrder
    keys: [SO, "${so_northgrid}"]
    expand: [Shipments]
  capture:
    Shipments[0].ShipmentNbr: ship_northgrid
- id: confirm-northgrid
  action: {entity: Shipment, name: ConfirmShipment}
  record: {ShipmentNbr: "${ship_northgrid}"}
  wait:
    entity: Shipment
    keys: ["${ship_northgrid}"]
    until: {Status: Confirmed}
- id: prepare-northgrid
  action: {entity: Shipment, name: PrepareInvoice}
  record: {ShipmentNbr: "${ship_northgrid}"}
- id: invnbr-northgrid
  get:
    entity: SalesOrder
    keys: [SO, "${so_northgrid}"]
    expand: [Shipments]
  capture:
    Shipments[0].InvoiceNbr: inv_northgrid
- id: release-inv-northgrid
  action: {entity: SalesInvoice, name: ReleaseSalesInvoice}
  record: {Type: Invoice, ReferenceNbr: "${inv_northgrid}"}
  wait:
    entity: SalesInvoice
    keys: [Invoice, "${inv_northgrid}"]
    until: {Status: Open}
# ---- sell: AGRISENSE (invoice stays open) ----------------------------
- id: so-agrisense
  put: SalesOrder
  record:
    OrderType: SO
    CustomerID: AGRISENSE
    Hold: false
    Details:
    - {InventoryID: GW-EDGE, OrderQty: 3, WarehouseID: WH01}
  capture: {OrderNbr: so_agrisense}
- id: ship-agrisense
  action: {entity: SalesOrder, name: SalesOrderCreateShipment}
  record: {OrderType: SO, OrderNbr: "${so_agrisense}"}
  parameters: {WarehouseID: WH01}
- id: shipnbr-agrisense
  get:
    entity: SalesOrder
    keys: [SO, "${so_agrisense}"]
    expand: [Shipments]
  capture:
    Shipments[0].ShipmentNbr: ship_agrisense
- id: confirm-agrisense
  action: {entity: Shipment, name: ConfirmShipment}
  record: {ShipmentNbr: "${ship_agrisense}"}
  wait:
    entity: Shipment
    keys: ["${ship_agrisense}"]
    until: {Status: Confirmed}
- id: prepare-agrisense
  action: {entity: Shipment, name: PrepareInvoice}
  record: {ShipmentNbr: "${ship_agrisense}"}
- id: invnbr-agrisense
  get:
    entity: SalesOrder
    keys: [SO, "${so_agrisense}"]
    expand: [Shipments]
  capture:
    Shipments[0].InvoiceNbr: inv_agrisense
- id: release-inv-agrisense
  action: {entity: SalesInvoice, name: ReleaseSalesInvoice}
  record: {Type: Invoice, ReferenceNbr: "${inv_agrisense}"}
  wait:
    entity: SalesInvoice
    keys: [Invoice, "${inv_agrisense}"]
    until: {Status: Open}
expect:
- get:
    entity: SalesInvoice
    keys: [Invoice, "${inv_acme}"]
  fields:
    Status: Closed
- get:
    entity: Payment
    keys: [Payment, "${pmt_acme}"]
  fields:
    Status: Closed
- inquire: InventorySummaryInquiry
  parameters: {InventoryID: GW-EDGE, WarehouseID: WH01}
  delta: {QtyOnHand: 3.0}
- inquire: InventorySummaryInquiry
  parameters: {InventoryID: GW-CELL, WarehouseID: WH01}
  delta: {QtyOnHand: 2.0}
- inquire: InventorySummaryInquiry
  parameters: {InventoryID: GW-RAIL, WarehouseID: WH01}
  delta: {QtyOnHand: 3.0}
- inquire: AccountSummaryInquiry
  parameters: {Ledger: ACTUAL, Period: "072026"}
  match: {Account: '40000'}
  delta: {EndingBalance: 4138.00}
- inquire: AccountSummaryInquiry
  parameters: {Ledger: ACTUAL, Period: "072026"}
  match: {Account: '50000'}
  delta: {EndingBalance: 1848.00}
- inquire: AccountSummaryInquiry
  parameters: {Ledger: ACTUAL, Period: "072026"}
  match: {Account: '20200'}
  delta: {EndingBalance: 3090.00}
- inquire: AccountSummaryInquiry
  parameters: {Ledger: ACTUAL, Period: "072026"}
  match: {Account: '11000'}
  delta: {EndingBalance: 2942.00}
- inquire: AccountSummaryInquiry
  parameters: {Ledger: ACTUAL, Period: "072026"}
  match: {Account: '10100'}
  delta: {EndingBalance: 1196.00}
