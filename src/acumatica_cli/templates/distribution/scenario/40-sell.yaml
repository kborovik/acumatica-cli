  record: {OrderType: SO, OrderNbr: "${so_agrisense}"}
  parameters: {WarehouseID: WH01}
- id: shipnbr-agrisense
  get:
    entity: SalesOrder
    keys: [SO, "${so_agrisense}"]
    expand: [Shipments]
  capture:
    Shipments[0].ShipmentNbr: ship_agrisense
- id: confirm-agrisense
  action: {entity: Shipment, name: ConfirmShipment}
  record: {ShipmentNbr: "${ship_agrisense}"}
  wait:
    entity: Shipment
    keys: ["${ship_agrisense}"]
    until: {Status: Confirmed}
- id: prepare-agrisense
  action: {entity: Shipment, name: PrepareInvoice}
  record: {ShipmentNbr: "${ship_agrisense}"}
- id: invnbr-agrisense
  get:
    entity: SalesOrder
    keys: [SO, "${so_agrisense}"]
    expand: [Shipments]
  capture:
    Shipments[0].InvoiceNbr: inv_agrisense
- id: release-inv-agrisense
  action: {entity: SalesInvoice, name: ReleaseSalesInvoice}
  record: {Type: Invoice, ReferenceNbr: "${inv_agrisense}"}
  wait:
    entity: SalesInvoice
    keys: [Invoice, "${inv_agrisense}"]
    until: {Status: Open}
- id: pay-agrisense
  put: Payment
  record:
    Type: Payment
    CustomerID: AGRISENSE
    PaymentMethod: WIRE
    CashAccount: '10100'
    PaymentAmount: 897.00
    PaymentRef: "WIRE-${inv_agrisense}"
    Hold: false
    DocumentsToApply:
    - {DocType: Invoice, ReferenceNbr: "${inv_agrisense}", AmountPaid: 897.00}
  capture: {ReferenceNbr: pmt_agrisense}
- id: release-pay-agrisense
  action: {entity: Payment, name: ReleasePayment}
  record: {Type: Payment, ReferenceNbr: "${pmt_agrisense}"}
  wait:
    entity: Payment
    keys: [Payment, "${pmt_agrisense}"]
    until: {Status: Closed}
expect:
- get:
    entity: SalesInvoice
    keys: [Invoice, "${inv_acme}"]
  fields:
    Status: Closed
- get:
    entity: Payment
    keys: [Payment, "${pmt_acme}"]
  fields:
    Status: Closed
- get:
    entity: SalesInvoice
    keys: [Invoice, "${inv_northgrid}"]
  fields:
    Status: Closed
- get:
    entity: Payment
    keys: [Payment, "${pmt_northgrid}"]
  fields:
    Status: Closed
- get:
    entity: SalesInvoice
    keys: [Invoice, "${inv_agrisense}"]
  fields:
    Status: Closed
- get:
    entity: Payment
    keys: [Payment, "${pmt_agrisense}"]
  fields:
    Status: Closed
- inquire: InventorySummaryInquiry
  parameters: {InventoryID: GW-EDGE, WarehouseID: WH01}
  delta: {QtyOnHand: -7.0}
- inquire: InventorySummaryInquiry
  parameters: {InventoryID: GW-CELL, WarehouseID: WH01}
  delta: {QtyOnHand: -3.0}
- inquire: InventorySummaryInquiry
  parameters: {InventoryID: GW-RAIL, WarehouseID: WH01}
  delta: {QtyOnHand: -2.0}
- inquire: AccountSummaryInquiry
  parameters: {Ledger: ACTUAL, Period: "072026"}
  match: {Account: '40000'}
  delta: {EndingBalance: 4138.00}
- inquire: AccountSummaryInquiry
  parameters: {Ledger: ACTUAL, Period: "072026"}
  match: {Account: '50000'}
  delta: {EndingBalance: 1848.00}
- inquire: AccountSummaryInquiry
  parameters: {Ledger: ACTUAL, Period: "072026"}
  match: {Account: '11000'}
  delta: {EndingBalance: 0.00}
- inquire: AccountSummaryInquiry
  parameters: {Ledger: ACTUAL, Period: "072026"}
  match: {Account: '10100'}
  delta: {EndingBalance: 4138.00}
