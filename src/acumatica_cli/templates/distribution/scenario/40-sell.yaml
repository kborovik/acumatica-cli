# Additive sell leg: three-customer SO -> ship -> invoice -> AR WIRE pay.
# Warm re-runnable (document numbers change; per-leg deltas hold).
#
# Deltas:
#   sales: ACMEMFG 4x EDGE 1196 + NORTHGRID 3x CELL + 2x RAIL 2045
#     + AGRISENSE 3x EDGE 897 = 4138 revenue; COGS 7x139 + 3x195 + 2x145 = 1848
#   all three customers pay WIRE in full -> AR 11000 net 0; cash +4138
#   inventory: EDGE -7, CELL -3, RAIL -2
# Requires on-hand stock from scenario/20-buy-gateways.yaml (or equivalent).
scenario: sell
description: Sell pack (SO ship invoice collect) for ACMEMFG NORTHGRID AGRISENSE
steps:
# ---- sell: ACMEMFG (pays in full) ------------------------------------
- id: so-acme
  put: SalesOrder
  record:
    OrderType: SO
    CustomerID: ACMEMFG
    Hold: false
    Details:
    - {InventoryID: GW-EDGE, OrderQty: 4, WarehouseID: WH01}
  capture: {OrderNbr: so_acme}
- id: ship-acme
  action: {entity: SalesOrder, name: SalesOrderCreateShipment}
  record: {OrderType: SO, OrderNbr: "${so_acme}"}
  parameters: {WarehouseID: WH01}
- id: shipnbr-acme
  get:
    entity: SalesOrder
    keys: [SO, "${so_acme}"]
    expand: [Shipments]
  capture:
    Shipments[0].ShipmentNbr: ship_acme
- id: confirm-acme
  action: {entity: Shipment, name: ConfirmShipment}
  record: {ShipmentNbr: "${ship_acme}"}
  wait:
    entity: Shipment
    keys: ["${ship_acme}"]
    until: {Status: Confirmed}
- id: prepare-acme
  action: {entity: Shipment, name: PrepareInvoice}
  record: {ShipmentNbr: "${ship_acme}"}
- id: invnbr-acme
  get:
    entity: SalesOrder
    keys: [SO, "${so_acme}"]
    expand: [Shipments]
  capture:
    Shipments[0].InvoiceNbr: inv_acme
- id: release-inv-acme
  action: {entity: SalesInvoice, name: ReleaseSalesInvoice}
  record: {Type: Invoice, ReferenceNbr: "${inv_acme}"}
  wait:
    entity: SalesInvoice
    keys: [Invoice, "${inv_acme}"]
    until: {Status: Open}
- id: pay-acme
  put: Payment
  record:
    Type: Payment
    CustomerID: ACMEMFG
    PaymentMethod: WIRE
    CashAccount: '10100'
    PaymentAmount: 1196.00
    PaymentRef: "WIRE-${inv_acme}"
    Hold: false
    DocumentsToApply:
    - {DocType: Invoice, ReferenceNbr: "${inv_acme}", AmountPaid: 1196.00}
  capture: {ReferenceNbr: pmt_acme}
- id: release-pay-acme
  action: {entity: Payment, name: ReleasePayment}
  record: {Type: Payment, ReferenceNbr: "${pmt_acme}"}
  wait:
    entity: Payment
    keys: [Payment, "${pmt_acme}"]
    until: {Status: Closed}
# ---- sell: NORTHGRID (pays in full) ----------------------------------
- id: so-northgrid
  put: SalesOrder
  record:
    OrderType: SO
    CustomerID: NORTHGRID
    Hold: false
    Details:
    - {InventoryID: GW-CELL, OrderQty: 3, WarehouseID: WH01}
    - {InventoryID: GW-RAIL, OrderQty: 2, WarehouseID: WH01}
  capture: {OrderNbr: so_northgrid}
- id: ship-northgrid
  action: {entity: SalesOrder, name: SalesOrderCreateShipment}
  record: {OrderType: SO, OrderNbr: "${so_northgrid}"}
  parameters: {WarehouseID: WH01}
- id: shipnbr-northgrid
  get:
    entity: SalesOrder
    keys: [SO, "${so_northgrid}"]
    expand: [Shipments]
  capture:
    Shipments[0].ShipmentNbr: ship_northgrid
- id: confirm-northgrid
  action: {entity: Shipment, name: ConfirmShipment}
  record: {ShipmentNbr: "${ship_northgrid}"}
  wait:
    entity: Shipment
    keys: ["${ship_northgrid}"]
    until: {Status: Confirmed}
- id: prepare-northgrid
  action: {entity: Shipment, name: PrepareInvoice}
  record: {ShipmentNbr: "${ship_northgrid}"}
- id: invnbr-northgrid
  get:
    entity: SalesOrder
    keys: [SO, "${so_northgrid}"]
    expand: [Shipments]
  capture:
    Shipments[0].InvoiceNbr: inv_northgrid
- id: release-inv-northgrid
  action: {entity: SalesInvoice, name: ReleaseSalesInvoice}
  record: {Type: Invoice, ReferenceNbr: "${inv_northgrid}"}
  wait:
    entity: SalesInvoice
    keys: [Invoice, "${inv_northgrid}"]
    until: {Status: Open}
- id: pay-northgrid
  put: Payment
  record:
    Type: Payment
    CustomerID: NORTHGRID
    PaymentMethod: WIRE
    CashAccount: '10100'
    PaymentAmount: 2045.00
    PaymentRef: "WIRE-${inv_northgrid}"
    Hold: false
    DocumentsToApply:
    - {DocType: Invoice, ReferenceNbr: "${inv_northgrid}", AmountPaid: 2045.00}
  capture: {ReferenceNbr: pmt_northgrid}
- id: release-pay-northgrid
  action: {entity: Payment, name: ReleasePayment}
  record: {Type: Payment, ReferenceNbr: "${pmt_northgrid}"}
  wait:
    entity: Payment
    keys: [Payment, "${pmt_northgrid}"]
    until: {Status: Closed}
# ---- sell: AGRISENSE (pays in full) ----------------------------------
- id: so-agrisense
  put: SalesOrder
  record:
    OrderType: SO
    CustomerID: AGRISENSE
    Hold: false
    Details:
    - {InventoryID: GW-EDGE, OrderQty: 3, WarehouseID: WH01}
  capture: {OrderNbr: so_agrisense}
- id: ship-agrisense
